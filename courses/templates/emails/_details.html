{% if details %}
<table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="margin:18px 0; border-collapse:collapse;">
  {% for label, value in details %}
  <tr>
    <td style="padding:9px 12px; background-color:#fafbfc; border:1px solid #eef0f3; font-family:Arial,Helvetica,sans-serif; font-size:13px; color:#6b7280; width:38%; vertical-align:top;">{{ label }}</td>
    <td style="padding:9px 12px; border:1px solid #eef0f3; font-family:Arial,Helvetica,sans-serif; font-size:14px; color:#2b2f38; vertical-align:top;">{{ value }}</td>
  </tr>
  {% endfor %}
</table>
{% endif %}
