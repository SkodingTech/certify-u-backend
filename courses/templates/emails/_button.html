{% if cta_url %}
<table role="presentation" cellpadding="0" cellspacing="0" style="margin:22px 0;">
  <tr>
    <td align="center" style="border-radius:8px; background-color:{{ brand_color }};">
      <a href="{{ cta_url }}" target="_blank" style="display:inline-block; padding:13px 30px; font-family:Arial,Helvetica,sans-serif; font-size:15px; font-weight:bold; color:#ffffff; text-decoration:none; border-radius:8px;">{{ cta_label|default:'Open' }}</a>
    </td>
  </tr>
</table>
{% endif %}
