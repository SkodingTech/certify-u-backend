# /etc/nginx/sites-available/certify-u
# Symlink into sites-enabled, then: sudo nginx -t && sudo systemctl reload nginx
#
# Pre-reqs:
#   - certbot certificate already issued for server.certify-u.com
#       sudo certbot --nginx -d server.certify-u.com
#   - gunicorn listening on /run/gunicorn.sock (per the systemd unit)

# Force HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name server.certify-u.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name server.certify-u.com;

    # Certs (managed by certbot)
    ssl_certificate     /etc/letsencrypt/live/server.certify-u.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/server.certify-u.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers (defence-in-depth — Django also sets some) ──
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "same-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Strict rate-limit zone (per-IP, 30 req/s burst 20) on /auth/
    limit_req_zone $binary_remote_addr zone=cu_auth:10m rate=10r/s;
    location /auth/ {
        limit_req zone=cu_auth burst=20 nodelay;
        proxy_pass         http://unix:/run/gunicorn.sock;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Upload cap 30 MB (covers our 25 MB Django setting + headroom)
    client_max_body_size 30M;

    # Health probes — bypass auth, cheap
    location = /health  { proxy_pass http://unix:/run/gunicorn.sock; }
    location = /healthz { proxy_pass http://unix:/run/gunicorn.sock; }

    # Everything else → gunicorn
    location / {
        proxy_pass         http://unix:/run/gunicorn.sock;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Static assets (collected by `manage.py collectstatic` to web/static)
    location /static/ {
        alias /home/ubuntu/certifyu-new/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
